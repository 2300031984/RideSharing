name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: mvn clean install -DskipTests
      working-directory: ridesharing

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Forntend/RideSharing/package-lock.json

    - name: Install Dependencies
      run: npm install
      working-directory: Forntend/RideSharing

    - name: Build Frontend
      run: npm run build
      working-directory: Forntend/RideSharing
