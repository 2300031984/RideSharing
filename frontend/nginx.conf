server {
  listen 80;
  server_name _;

  root   /usr/share/nginx/html;
  index  index.html;

  # Serve static files directly
  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }

  # Single Page App fallback
  location / {
    try_files $uri /index.html;
  }
}
