services:
  - type: web
    name: ridesharing-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ridesharing/Dockerfile
    # buildCommand and startCommand are handled by the Dockerfile

    envVars:
      - key: PORT
        value: 8081
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: ZIPKIN_ENDPOINT
        sync: false
