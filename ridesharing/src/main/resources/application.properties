# =========================================
# SERVER CONFIG
# =========================================
server.port=${PORT:8081}


# =========================================
# FEATURE TOGGLES (FOR LOCAL PROTOTYPE)
# =========================================
app.feature.redis.enabled=true
app.feature.kafka.enabled=false
app.feature.firebase.enabled=false
spring.kafka.enabled=false

# =========================================
# DATABASE CONFIGURATION (MONGODB)
# =========================================
# Configure via Render environment variables (do not commit secrets into source).
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ridesharing_db}
spring.data.mongodb.database=ridesharing_db


# =========================================
# REDIS CONFIGURATION
# =========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false


# =========================================
# STRIPE CONFIGURATION (OPTIONAL FOR DEMO)
# =========================================
stripe.api.secretKey=${STRIPE_API_SECRET_KEY:sk_test_replace_with_your_secret_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_with_your_webhook_secret}


# =========================================
# QUARTZ SCHEDULER CONFIG
# =========================================
spring.quartz.job-store-type=memory
# spring.quartz.jdbc.initialize-schema=always  # Not needed for memory store
spring.quartz.properties.org.quartz.jobStore.isClustered=false
spring.quartz.properties.org.quartz.threadPool.threadCount=10


# =========================================
# FIREBASE CONFIG
# =========================================
app.firebase.config.path=classpath:firebase-service-account.json
app.firebase.enabled=false


# =========================================
# JPA / HIBERNATE CONFIG
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# =========================================
# JWT CONFIG
# =========================================
# Use a strong secret in production (set via env var in Render).
jwt.secret=${JWT_SECRET:rideSharingSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS512Algorithm}
jwt.expiration=86400000


# =========================================
# CORS CONFIG
# =========================================
cors.allowed.origins=http://localhost:5173,http://localhost:5174,http://localhost:3000


# =========================================
# LOGGING CONFIG
# =========================================
logging.level.com.takeme=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-}, %X{spanId:-}] - %msg%n


# =========================================
# DISTRIBUTED TRACING (OPTIONAL)
# =========================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info


# =========================================
# FILE UPLOAD CONFIG
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB